name: PR Validation

on:
  pull_request:
    branches: [main, develop]

jobs:
  test-shared:
    name: Test Shared Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd shared && npm ci

      - name: Build shared
        run: cd shared && npm run build

      - name: Run shared tests
        run: cd shared && npm test

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: test-shared
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd shared && npm ci && npm run build
          cd ../backend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Run backend tests
        run: cd backend && npm test

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd shared && npm ci && npm run build
          cd ../frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run frontend tests
        run: cd frontend && npm test

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
