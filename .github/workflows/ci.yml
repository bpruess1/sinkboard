name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test -- --coverage
        env:
          NODE_ENV: test

      - name: Build application
        run: npm run build

  python-lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black

      - name: Run linting
        run: |
          flake8 apps/api --max-line-length=120
          black --check apps/api

      - name: Run tests
        run: pytest apps/api --cov=apps/api --cov-report=xml
        env:
          ENVIRONMENT: test
          DATABASE_URL: sqlite:///test.db

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test, python-lint-and-test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d -p 3000:3000 --name test-container app:${{ github.sha }}
          sleep 10
          docker logs test-container
          docker stop test-container
