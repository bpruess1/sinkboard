name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test suite (emergency only)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'
  AWS_REGION: 'us-east-1'

jobs:
  # --------------- Pre-deployment validation ---------------
  validate:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix shared
          npm ci --prefix backend
          npm ci --prefix frontend
      
      - name: Run test suite
        run: |
          npm test --prefix shared
          npm test --prefix backend
          npm test --prefix frontend

  # --------------- Build artifacts ---------------
  build:
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ !cancelled() && (needs.validate.result == 'success' || inputs.skip_tests) }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Build shared package
        run: |
          npm ci --prefix shared
          npm run build --prefix shared
      
      - name: Build backend
        run: |
          npm ci --prefix backend
          npm run build --prefix backend
      
      - name: Build frontend
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend
        env:
          VITE_API_URL: ${{ vars.PRODUCTION_API_URL }}
      
      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 7
      
      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # --------------- Deploy backend services ---------------
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
      
      - name: Deploy Lambda functions
        run: |
          cd infrastructure/terraform
          terraform init
          terraform apply -auto-approve \
            -var="environment=production" \
            -var="backend_source=../../backend/dist"
      
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://backend/dist/lambda.zip

  # --------------- Deploy frontend ---------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [build, deploy-backend]
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
      
      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ vars.S3_BUCKET_NAME }} --delete
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # --------------- Smoke tests ---------------
  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Health check API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.PRODUCTION_API_URL }}/health)
          if [ "$response" != "200" ]; then
            echo "API health check failed with status $response"
            exit 1
          fi
      
      - name: Health check frontend
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://${{ vars.PRODUCTION_DOMAIN }})
          if [ "$response" != "200" ]; then
            echo "Frontend health check failed with status $response"
            exit 1
          fi
      
      - name: Notify Sentry of deployment
        run: |
          curl -X POST https://sentry.io/api/0/organizations/${{ vars.SENTRY_ORG }}/releases/ \
            -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "version": "${{ github.sha }}",
              "projects": ["sink-board"],
              "refs": [{
                "repository": "${{ github.repository }}",
                "commit": "${{ github.sha }}"
              }]
            }'

  # --------------- Rollback plan ---------------
  rollback:
    runs-on: ubuntu-latest
    needs: [smoke-test]
    if: failure()
    environment: production
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Rollback Lambda to previous version
        run: |
          aws lambda update-function-configuration \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
            --environment Variables="{ROLLBACK=true}"
      
      - name: Notify team of rollback
        run: |
          echo "Production deployment failed. Manual intervention required."
          echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"